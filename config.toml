# Contacts

[[ menu.social]]
  identifier = 'github'
  name = 'Github'
  pre = "<i class='fab fa-github fa-lg'></i>"
  url = "https://github.com/keorangi"
  weight = 20

[outputs]
  home = ['HTML', 'RSS']
  pages = ['HTML']
